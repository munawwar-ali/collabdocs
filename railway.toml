# Railway deployment configuration for the WebSocket server
# Deploy this as a separate Railway service from the Next.js app
#
# Steps:
# 1. Create a new Railway project
# 2. Connect your GitHub repo
# 3. Set root directory to: / (repo root)
# 4. Set start command to: node server/ws-server.js
# 5. Add environment variable: PORT=1234 (Railway injects $PORT automatically)
# 6. Copy the Railway public URL to NEXT_PUBLIC_WS_URL in Vercel

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node server/ws-server.js"
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
